version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: COOSDB
    restart: always
    ports:
      - "3388:3306"
    environment:
      MYSQL_ROOT_PASSWORD: userPassword
      MYSQL_DATABASE: COOSDB
      MYSQL_USER: COOSUser
      MYSQL_PASSWORD: userPassword
      TZ: Asia/Bangkok
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
